<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack your bags... ✈️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e6f7ff;
            --blob-color: #ffffff;
            --text-color: #555555;
        }

        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: var(--bg-color); font-family: 'Nunito', sans-serif;
            text-align: center; color: var(--text-color); transition: background-color 1.5s ease;
            overflow: hidden; position: relative; user-select: none;
        }

        /* --- Suitcase Intro Screen --- */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffdab9;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1s ease, transform 1s ease;
        }

        .suitcase-icon {
            font-size: 80px; cursor: pointer; animation: bounce 1.5s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        .envelope-text {
            margin-top: 20px; font-family: 'Pacifico', cursive; font-size: 26px; color: #d84315;
            animation: pulse 1.5s infinite alternate;
        }

        /* --- Main Story Container --- */
        #main-content {
            display: none; flex-direction: column; align-items: center; width: 100%; z-index: 10;
        }

        /* --- Animated Blob Character --- */
        #character-container { position: relative; margin-bottom: 20px; cursor: pointer; z-index: 20;}

        .blob {
            width: 160px; height: 150px; background-color: var(--blob-color);
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            box-shadow: 0 15px 25px rgba(0,0,0,0.08); position: relative;
            animation: float 3s ease-in-out infinite; transition: all 0.5s ease;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; } }

        /* Facial Features */
        .face { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; transition: all 0.3s ease; }
        .eye { position: absolute; width: 14px; height: 14px; background-color: #444; border-radius: 50%; top: 40px; transition: all 0.3s ease; }
        .eye.left { left: 45px; } .eye.right { right: 45px; }
        .mouth { position: absolute; width: 20px; height: 10px; border-bottom: 3px solid #444; border-radius: 50%; top: 60px; left: 50%; transform: translateX(-50%); transition: all 0.3s ease; }
        .blush { position: absolute; width: 25px; height: 12px; background-color: #ffb3b3; border-radius: 50%; top: 55px; opacity: 0; transition: opacity 0.3s ease; }
        .blush.left { left: 25px; } .blush.right { right: 25px; }

        /* Emotions */
        .curious .eye { width: 16px; height: 16px; top: 38px; }
        .curious .mouth { width: 12px; height: 12px; border: 3px solid #444; border-radius: 50%; top: 62px; background: transparent;}
        .excited .eye { height: 4px; border-radius: 10px; top: 45px; }
        .excited .mouth { width: 25px; height: 15px; border-bottom: 4px solid #444; top: 55px; }
        .excited .blush { opacity: 1; }
        .pleading .eye { width: 18px; height: 18px; top: 38px; }
        .pleading .eye::after { content: ''; position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; top: 2px; left: 2px; }
        .pleading .mouth { width: 10px; height: 10px; border: 3px solid #444; border-radius: 50%; top: 62px; background: #ff9999;}
        .pleading .blush { opacity: 0.6; }
        .love .eye { background-color: transparent; }
        .love .eye::before { content: '❤️'; font-size: 24px; position: absolute; top: -14px; left: -5px; animation: pulse 1s infinite alternate; }
        .love .mouth { width: 20px; height: 15px; border-bottom: 3px solid #444; top: 55px; }
        .love .blush { opacity: 0.8; }

        /* Sunglasses for the cool travel blob! */
        .cool .eye { display: none; }
        .cool .mouth { width: 20px; height: 10px; border-bottom: 3px solid #444; top: 60px; }
        .cool::after { content: '🕶️'; font-size: 55px; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5; }

        /* --- Dialogue Box --- */
        #dialogue-wrapper { position: relative; margin-bottom: 30px; z-index: 20; width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; }
        #dialogue-box {
            background: white; padding: 25px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 85%;
            font-size: 20px; position: relative; line-height: 1.6; min-height: 100px;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        #dialogue-box::after { content: ''; position: absolute; top: -15px; left: 50%; margin-left: -15px; border-width: 0 15px 15px 15px; border-style: solid; border-color: transparent transparent white transparent; }
        
        #message-text { display: inline-block; min-height: 80px; width: 100%; }
        .typing-cursor { border-right: 2px solid #555; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { border-color: transparent; } 50% { border-color: #555; } }

        /* --- Interactive Mini Games --- */
        #interactive-container { width: 100%; display: none; margin-top: 15px; }
        
        /* Game 1: Packing */
        #pack-game { display: none; flex-wrap: wrap; justify-content: center; gap: 20px; background: #fff0f5; padding: 15px; border-radius: 15px; border: 2px dashed #ffb3c6; }
        .pack-item { font-size: 45px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .pack-item:hover { transform: scale(1.1) rotate(5deg); }
        .pack-item.packed { transform: scale(0) rotate(-45deg); opacity: 0; pointer-events: none; }

        /* Game 2: Travel Choice */
        #travel-choice { display: none; flex-wrap: wrap; justify-content: center; gap: 10px; background: #e6f7ff; padding: 15px; border-radius: 15px; border: 2px dashed #80c1ff; }
        .travel-btn { background: white; color: #555; border: 2px solid #80c1ff; padding: 10px 20px; font-size: 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .travel-btn:hover { background: #80c1ff; color: white; transform: translateY(-2px); }

        /* --- Buttons --- */
        .btn-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; min-height: 60px; position: relative; width: 100%; z-index: 20; }
        .main-btn { background-color: #ff8c42; color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(255, 140, 66, 0.4); font-family: 'Nunito', sans-serif; }
        .main-btn:hover { background-color: #e87024; transform: translateY(-2px); }
        .main-btn:disabled { background-color: #ccc !important; cursor: not-allowed; box-shadow: none; transform: none; }
        
        #yes-btn { display: none; background-color: #4CAF50; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); }
        #yes-btn:hover { background-color: #45a049; }
        #no-btn { display: none; background-color: #f44336; }

        /* --- VIP Ticket (End Screen) --- */
        #ticket-container {
            display: none; width: 90%; max-width: 400px; background: white;
            border-radius: 15px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin-top: 10px; animation: dropInTicket 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative; z-index: 10; flex-direction: row; border: 2px solid #ffccbc;
        }
        .ticket-left { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); padding: 20px; color: white; flex: 2; text-align: left; border-right: 3px dashed white; position: relative; }
        .ticket-right { background: #fff; padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ff8c42; }
        .ticket-title { font-family: 'Pacifico', cursive; font-size: 24px; margin: 0 0 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .ticket-detail { margin: 5px 0; font-size: 16px; font-weight: bold; }
        .ticket-small { font-size: 12px; opacity: 0.9; margin: 0; }
        .barcode { font-family: 'Courier New', Courier, monospace; font-size: 20px; letter-spacing: 2px; margin-top: 10px; font-weight: bold; color: #444; transform: rotate(90deg); }
        @keyframes dropInTicket { 0% { opacity: 0; transform: translateY(-50px) scale(0.9) rotate(-5deg); } 100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); } }

        /* --- Particle Effects --- */
        .confetti { position: absolute; width: 10px; height: 10px; background-color: #f00; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        
        .floating-word {
            position: absolute; font-family: 'Pacifico', cursive; color: #ff8c42;
            font-size: 22px; pointer-events: none; z-index: 100; font-weight: bold;
            text-shadow: 0 2px 5px rgba(255,255,255,0.8); animation: floatWordAnim 2s ease-out forwards;
        }
        @keyframes floatWordAnim { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); } 100% { transform: translate(-50%, -100px) scale(1); opacity: 0; } }

        /* Progress Dots */
        #progress-dots { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
        .dot { width: 8px; height: 8px; background-color: #ddd; border-radius: 50%; transition: all 0.3s ease; }
        .dot.active { background-color: #ff8c42; transform: scale(1.3); }

        @media (max-width: 500px) {
            #dialogue-box { font-size: 18px; padding: 20px; width: 85%; }
            .main-btn { padding: 12px 25px; font-size: 16px; }
            .ticket-left { padding: 15px; } .ticket-title { font-size: 20px; } .ticket-detail { font-size: 14px; }
            .pack-item { font-size: 35px; }
        }
    </style>
</head>
<body>

    <!-- Acoustic Travel Music -->
    <audio id="bg-music" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-sun-and-his-daughter-580.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-screen">
        <div class="suitcase-icon" onclick="startStory()">🧳</div>
        <div class="envelope-text">Tap to unpack...</div>
    </div>

    <div id="main-content">
        <div id="character-container">
            <div id="blob" class="blob curious">
                <div class="face">
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="mouth"></div>
                </div>
            </div>
        </div>

        <div id="dialogue-wrapper">
            <div id="dialogue-box">
                <span id="message-text"></span>
                
                <!-- Interactive Games Container -->
                <div id="interactive-container">
                    
                    <!-- Game 1: Packing -->
                    <div id="pack-game">
                        <span class="pack-item" onclick="packItem(this)">📸</span>
                        <span class="pack-item" onclick="packItem(this)">🕶️</span>
                        <span class="pack-item" onclick="packItem(this)">🧴</span>
                        <span class="pack-item" onclick="packItem(this)">👗</span>
                    </div>

                    <!-- Game 2: Travel Selector -->
                    <div id="travel-choice">
                        <button class="travel-btn" onclick="chooseTravel('Flight ✈️')">Flight ✈️</button>
                        <button class="travel-btn" onclick="chooseTravel('Train 🚂')">Train 🚂</button>
                        <button class="travel-btn" onclick="chooseTravel('Road Trip 🚗')">Road Trip 🚗</button>
                    </div>

                </div>

                <div id="progress-dots"></div>
            </div>
        </div>

        <!-- The Final VIP Ticket -->
        <div id="ticket-container">
            <div class="ticket-left">
                <h3 class="ticket-title">Getaway Pass ✨</h3>
                <p class="ticket-small">PASSENGER:</p>
                <p class="ticket-detail">The Most Special Girl 💕</p>
                <p class="ticket-small">DESTINATION:</p>
                <p class="ticket-detail">Jaipur (The Pink City) 🏰</p>
            </div>
            <div class="ticket-right">
                <p class="ticket-small">ONE WAY TO</p>
                <h3 style="margin: 5px 0;">Memories</h3>
                <div class="barcode">|||||||||</div>
            </div>
        </div>

        <div class="btn-container" id="btn-wrap">
            <button class="main-btn" id="next-btn">Next ➔</button>
            <button class="main-btn" id="yes-btn">Yes! Let's go! ✈️</button>
            <button class="main-btn" id="no-btn">No way 🙅‍♀️</button>
        </div>
    </div>

    <script>
        const story = [
            { text: "Hey! So... since we have a long week off from college...", emotion: "curious", bg: "#e6f7ff" },
            { text: "I was thinking... we need a proper getaway. Just the two of us.", emotion: "excited", bg: "#e6ffe6" },
            { text: "To leave all the stress behind, relax, and finally make those beautiful memories.", emotion: "love", bg: "#fff0f5" },
            { text: "I've chosen the perfect destination... The Pink City, Jaipur! 🏰🐪🌸", emotion: "cool", bg: "#ffebcc" },
            
            // GAME 1: PACKING
            { text: "But wait! I can't do this alone. Tap the items below to help me pack the suitcase! 🧳", emotion: "curious", bg: "#ffe4e1", action: "pack" },
            
            // GAME 2: TRAVEL CHOICE
            { text: "Awesome! Everything is packed. Now, how do you want to travel there?", emotion: "excited", bg: "#e0ffff", action: "travel" },
            
            { text: "Perfect! Everything is set. Now for the most important question...", emotion: "pleading", bg: "#ffccbc" },
            { text: "Will you go on this trip with me? 🥺❤️", emotion: "love", bg: "#ffb6c1", isQuestion: true }
        ];

        let currentIndex = 0;
        let isTyping = false;
        let typingTimeout;
        let waitingForAction = false;
        
        const introScreen = document.getElementById('intro-screen');
        const mainContent = document.getElementById('main-content');
        const blob = document.getElementById('blob');
        const messageText = document.getElementById('message-text');
        const nextBtn = document.getElementById('next-btn');
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const body = document.body;
        const progressContainer = document.getElementById('progress-dots');
        const interactiveContainer = document.getElementById('interactive-container');
        const packGame = document.getElementById('pack-game');
        const travelChoice = document.getElementById('travel-choice');
        const ticketContainer = document.getElementById('ticket-container');
        const bgMusic = document.getElementById('bg-music');

        // --- Floating Words on Tap ---
        const sweetWords = ["Jaipur! 🏰", "Vacation! ✈️", "Memories! 📸", "So Special! 🌸", "Road Trip! 🚗", "My Girl! 🥰"];
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('pack-item') || e.target.closest('#intro-screen')) return;
            const word = document.createElement('div');
            word.classList.add('floating-word'); word.textContent = sweetWords[Math.floor(Math.random() * sweetWords.length)];
            word.style.left = e.pageX + 'px'; word.style.top = e.pageY + 'px';
            document.body.appendChild(word); setTimeout(() => word.remove(), 2000);
        });

        // --- Mini Game 1: Packing Logic ---
        let itemsPacked = 0;
        function packItem(el) {
            if(el.classList.contains('packed')) return;
            el.classList.add('packed');
            itemsPacked++;
            
            // Spawn a cute text when packed
            const pop = document.createElement('div'); pop.classList.add('floating-word'); pop.textContent = "Packed! ✔️";
            pop.style.left = '50%'; pop.style.top = '40%'; document.body.appendChild(pop); setTimeout(() => pop.remove(), 1000);

            if(itemsPacked === 4) {
                setTimeout(() => {
                    waitingForAction = false;
                    nextBtn.disabled = false;
                    nextBtn.textContent = "All packed! Next ➔";
                }, 500);
            }
        }

        // --- Mini Game 2: Travel Logic ---
        function chooseTravel(method) {
            waitingForAction = false;
            nextBtn.disabled = false;
            nextBtn.textContent = "Next ➔";
            
            // Instantly update the text to react to her choice!
            messageText.innerHTML = `Yay! A <b>${method}</b> sounds perfect for us. <br><br><span style="font-size:16px">(Click next to continue!)</span>`;
            travelChoice.style.display = 'none';
        }

        // Setup dots
        story.forEach((_, index) => {
            const dot = document.createElement('div'); dot.classList.add('dot');
            if(index === 0) dot.classList.add('active'); progressContainer.appendChild(dot);
        });

        function updateDots() { document.querySelectorAll('.dot').forEach((dot, index) => { dot.classList.toggle('active', index === currentIndex); }); }

        function startStory() {
            bgMusic.volume = 0.4; bgMusic.play().catch(e => console.log("Audio autoplay blocked."));
            introScreen.style.opacity = '0'; introScreen.style.transform = 'scale(1.2)';
            setTimeout(() => {
                introScreen.style.display = 'none'; mainContent.style.display = 'flex'; updateSlide();
                
                setTimeout(() => {
                    const hint = document.createElement('div'); hint.classList.add('floating-word'); hint.textContent = "Tap the background! ✨";
                    hint.style.left = '50%'; hint.style.top = '20%'; document.body.appendChild(hint); setTimeout(() => hint.remove(), 2500);
                }, 1000);
            }, 800);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                // Quick tag bypass for <br> or <b>
                if(text.charAt(i) === '<') {
                    let tag = ''; while(text.charAt(i) !== '>' && i < text.length) { tag += text.charAt(i); i++; } tag += '>';
                    messageText.innerHTML = messageText.innerHTML.replace('<span class="typing-cursor"></span>', '') + tag + '<span class="typing-cursor"></span>';
                    typeWriter(text, i + 1); return;
                }

                messageText.innerHTML = messageText.innerHTML.replace('<span class="typing-cursor"></span>', '') + text.charAt(i) + '<span class="typing-cursor"></span>';
                typingTimeout = setTimeout(() => typeWriter(text, i + 1), 35); 
            } else {
                messageText.innerHTML = text; 
                isTyping = false;
                handleSlideAction();
            }
        }

        function handleSlideAction() {
            const current = story[currentIndex];
            
            if(current.action === 'pack') {
                waitingForAction = true;
                interactiveContainer.style.display = 'block';
                packGame.style.display = 'flex';
                nextBtn.disabled = true;
                nextBtn.textContent = "Pack all 4 items to continue";
            } 
            else if(current.action === 'travel') {
                waitingForAction = true;
                interactiveContainer.style.display = 'block';
                travelChoice.style.display = 'flex';
                nextBtn.disabled = true;
                nextBtn.textContent = "Select a travel method above";
            }
            else if(current.isQuestion) {
                nextBtn.style.display = 'none';
                yesBtn.style.display = 'block';
                noBtn.style.display = 'block';
            }
            else {
                nextBtn.disabled = false;
                nextBtn.textContent = "Next ➔";
            }
        }

        function updateSlide() {
            const current = story[currentIndex];
            
            clearTimeout(typingTimeout);
            isTyping = true;
            waitingForAction = false;
            nextBtn.disabled = true; 
            
            // Reset interactive areas
            interactiveContainer.style.display = 'none';
            packGame.style.display = 'none';
            travelChoice.style.display = 'none';
            
            messageText.innerHTML = '<span class="typing-cursor"></span>';
            setTimeout(() => typeWriter(current.text, 0), 200);

            blob.className = 'blob ' + current.emotion;
            body.style.backgroundColor = current.bg;
            updateDots();
        }

        nextBtn.addEventListener('click', () => {
            if (isTyping || waitingForAction) return; 
            if (currentIndex < story.length - 1) {
                currentIndex++;
                updateSlide();
            }
        });

        // The "No" button dodges!
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        function moveButton(e) {
            e.preventDefault();
            const randomX = Math.floor(Math.random() * (window.innerWidth - noBtn.clientWidth));
            const randomY = Math.floor(Math.random() * (window.innerHeight - noBtn.clientHeight - 100));
            noBtn.style.position = 'fixed'; noBtn.style.left = randomX + 'px'; noBtn.style.top = randomY + 'px';
        }

        yesBtn.addEventListener('click', () => {
            messageText.innerHTML = "YAY! We are making memories! 🧳💕";
            blob.className = 'blob love';
            yesBtn.style.display = 'none'; noBtn.style.display = 'none';
            document.getElementById('dialogue-wrapper').style.display = 'none'; 
            
            ticketContainer.style.display = 'flex';
            fireConfetti();
        });

        function fireConfetti() {
            const colors = ['#ff8c42', '#ff4d88', '#4CAF50', '#80c1ff', '#ffd700'];
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
